name: CXDB Cross-Compile Release

on:
  workflow_dispatch:
    inputs:
      cxdb_version:
        description: 'CXDB version tag to build (e.g., v0.1.0)'
        required: true
        default: 'v0.1.0'
      cxdb_ref:
        description: 'Git ref to checkout from strongdm/cxdb (branch, tag, or SHA)'
        required: true
        default: 'main'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build cxdb-server (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: cxdb-server-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: cxdb-server-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: cxdb-server-darwin-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: cxdb-server-darwin-aarch64
    steps:
      - name: Checkout CXDB source
        uses: actions/checkout@v6
        with:
          repository: strongdm/cxdb
          ref: ${{ inputs.cxdb_ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build cxdb-server
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          cargo build --release --target ${{ matrix.target }} -p cxdb-server

      - name: Package binary
        run: |
          cp target/${{ matrix.target }}/release/cxdb-server ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}
          sha256sum ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256 || shasum -a 256 ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create release
        env:
          CXDB_VERSION: ${{ inputs.cxdb_version }}
          CXDB_REF: ${{ inputs.cxdb_ref }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: cxdb-${{ inputs.cxdb_version }}
          name: "CXDB ${{ inputs.cxdb_version }}"
          body: |
            Cross-compiled cxdb-server binaries from [strongdm/cxdb](https://github.com/strongdm/cxdb).

            ## Binaries
            | Platform | File |
            |----------|------|
            | Linux x86_64 | `cxdb-server-linux-x86_64` |
            | Linux aarch64 | `cxdb-server-linux-aarch64` |
            | macOS x86_64 | `cxdb-server-darwin-x86_64` |
            | macOS aarch64 | `cxdb-server-darwin-aarch64` |

            ## Install
            ```bash
            clavain-cli cxdb-setup
            ```
          files: |
            artifacts/**/*
          draft: false
          prerelease: false
