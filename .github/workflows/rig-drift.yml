name: Rig Drift Check

on:
  push:
    branches: [main]
    paths:
      - "os/clavain/agent-rig.json"
      - "interverse/**/.claude-plugin/plugin.json"
  pull_request:
    paths:
      - "os/clavain/agent-rig.json"
      - "interverse/**/.claude-plugin/plugin.json"
  schedule:
    - cron: "0 7 * * 1"  # Weekly Monday 7am UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check rig drift
        run: bash scripts/check-rig-drift.sh --verbose

      - name: Create issue on scheduled failure
        if: failure() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing=$(gh issue list --repo "$GITHUB_REPOSITORY" --label "ci-drift" --state open --limit 1 --json number --jq '.[0].number // empty')
          if [ -z "$existing" ]; then
            gh issue create --repo "$GITHUB_REPOSITORY" \
              --title "Rig drift check failing (scheduled)" \
              --label "ci-drift" \
              --body "The weekly rig-drift check failed. [Run log]($GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID)."
          fi
