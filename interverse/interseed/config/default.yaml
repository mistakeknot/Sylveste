# interseed configuration
db_path: ~/.interseed/interseed.db

# Refinement settings
refinement:
  limit: 10                    # max ideas per refine cycle
  lock_stale_minutes: 10       # advisory lock staleness threshold
  model: claude-sonnet-4-6     # model for refinement calls

# Signal matching
signals:
  interject_db_path: ~/.interject/interject.db  # actual interject default path

# Graduation
graduation:
  confidence_threshold: 0.7
  brainstorm_dir: docs/brainstorms/
  monorepo_root: ~/projects/Sylveste  # working dir for bd commands
