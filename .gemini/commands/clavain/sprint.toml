## Auto-Advance

Between steps, if `$(bd state "$CLAVAIN_BEAD_ID" sprint)` == `"true"`:
```bash
pause_reason=$(clavain-cli sprint-advance "$CLAVAIN_BEAD_ID" "<current_phase>" "<artifact_path>")
```
On non-zero exit, parse `reason_type="${pause_reason%%|*}"`:
- `gate_blocked` → Gemini elicitation adapter: Fix issues / Skip gate / Stop sprint
- `manual_pause` → Gemini elicitation adapter: Continue / Stop
- `stale_phase` → re-read state, route to new phase via `clavain-cli sprint-next-step`
- `budget_exceeded` → Gemini elicitation adapter: Continue (override) / Stop / Adjust budget

Display at each advance: `Phase: <current> → <next> (auto-advancing)`. No "what next?" prompts unless pause triggered, step fails, or tier requires a checkpoint at this step.

**Tier-aware checkpoints:** Tier 1 pauses only on `gate_blocked` (quality-gates FAIL). Tier 2 also pauses after Step 4 (plan review). Tier 3 preserves all existing Gemini elicitation adapter calls in sub-commands.

