### 3a. Shadow Tracker Detection

Find markdown tracking work outside beads: `todos/*.md` with status frontmatter, `pending-beads*.md`, `docs/*.md` with status frontmatter. Count matches, list files, report PASS or WARN with `/clavain:bead-sweep` fix suggestion.

```bash
if [ -d .beads ] && command -v bd >/dev/null 2>&1; then
  _sc=0; _sf=""
  _check_status() { head -10 "$1" 2>/dev/null | grep -qE '^status:\s*(pending|open|done|complete|ready|in_progress)'; }
  while IFS= read -r _f; do [ -n "$_f" ] && _check_status "$_f" && _sf="${_sf}  - ${_f}\n" && _sc=$((_sc+1)); done < <(find . -path '*/todos/*.md' -not -path './.git/*' -not -path './node_modules/*' 2>/dev/null)
  while IFS= read -r _f; do [ -n "$_f" ] && _sf="${_sf}  - ${_f}\n" && _sc=$((_sc+1)); done < <(find . -name 'pending-beads*.md' -not -path './.git/*' 2>/dev/null)
  while IFS= read -r _f; do [ -n "$_f" ] && ! echo "$_f"|grep -q '/todos/' && _check_status "$_f" && _sf="${_sf}  - ${_f}\n" && _sc=$((_sc+1)); done < <(find . -path '*/docs/*' -name '*.md' -not -path './.git/*' -not -path './node_modules/*' -newer .beads/config 2>/dev/null | head -50)
  [ "$_sc" -eq 0 ] && echo "shadow trackers: PASS" || { echo "shadow trackers: WARN ($_sc files)"; printf "%b" "$_sf"; }
fi
