## Step 3: Topological Sort

Build adjacency list from dependency edges. Only include deps that are also children of this epic (cross-epic deps are treated as external — if open, flag as blocker).

**Algorithm:**
1. Initialize `in_degree[child] = 0` for each open child.
2. For each dep edge where both source and target are open children: `in_degree[target]++`.
3. Phase 0 = all children with `in_degree == 0`.
4. Remove Phase 0 nodes, decrement in_degree of their dependents. Repeat for Phase 1, 2, ...
5. If any nodes remain with in_degree > 0 after all phases: **cycle detected** — halt with error listing the cycle members.

**External blockers:** If a child depends on a bead *not* in this epic that is still open, flag it:
