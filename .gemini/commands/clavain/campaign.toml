- **Canary failure** (from rsj.1.2): If a feature's post-merge canary fails during dispatch, `/clavain:route` → `/clavain:sprint` → landing skill will halt. Campaign sees the feature as not-closed and triggers the 6b retry/skip/abort flow.
- **Review backpressure** (from rsj.1.3): Dispatch scoring handles this transparently — campaign doesn't need special logic.
- **Dolt crash:** If `bd` commands fail mid-campaign, halt immediately: "Beads unavailable — campaign paused at Phase $phase_num. Fix with: `fuser .beads/dolt/Sylveste/.dolt/noms/journal.idx`, kill PID, `bd dolt start`, `bd backup restore`. Then re-run `/clavain:campaign $EPIC_ID` to resume."
- **Session timeout:** Campaign state is persisted in bead states (`campaign_phase_N=done`). A new session running `/clavain:campaign $EPIC_ID` can detect completed phases and resume from the next incomplete one.

