   - `open`/`in_progress` → feature incomplete. Gemini elicitation adapter: "Feature $feature_id not closed after dispatch. Retry, skip, or abort campaign?"

**Parallelism within a phase:**
- If ALL features in the phase have complexity <= 2 AND the phase has <= 3 features: dispatch via parallel Agent tool calls (each agent runs `/clavain:route` for one feature).
- Otherwise: dispatch sequentially (one `/clavain:route` at a time) to avoid context pressure and allow checkpointing.

