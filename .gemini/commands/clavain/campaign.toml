### 6b: Dispatch Features

For each feature in the current phase:

1. **Claim:** `bd update "$feature_id" --claim`, then claim-identity pattern.
2. **Set campaign context:** `bd set-state "$feature_id" "campaign_epic=$EPIC_ID"`, `bd set-state "$feature_id" "campaign_phase=$phase_num"`
