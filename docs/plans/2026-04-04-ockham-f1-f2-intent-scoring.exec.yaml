version: 1
mode: dependency-driven
tier: deep
max_parallel: 3
timeout_per_task: 300

stages:
  - name: "Wave 1 — Foundation"
    tasks:
      - id: task-1
        title: "Module setup + halt sentinel"
        files: [os/Ockham/go.mod, os/Ockham/internal/halt/halt.go, os/Ockham/internal/halt/halt_test.go]
        depends: []

  - name: "Wave 2 — Intent package"
    tasks:
      - id: task-2
        title: "Intent types + YAML schema"
        files: [os/Ockham/internal/intent/types.go, os/Ockham/internal/intent/types_test.go]
        depends: [task-1]
      - id: task-3
        title: "Intent store (load/save/validate)"
        files: [os/Ockham/internal/intent/store.go, os/Ockham/internal/intent/store_test.go]
        depends: [task-2]

  - name: "Wave 3 — Scoring + Governor (parallel)"
    tasks:
      - id: task-4
        title: "Scoring types + scorer (+ authority/anomaly stubs)"
        files: [os/Ockham/internal/authority/authority.go, os/Ockham/internal/anomaly/anomaly.go, os/Ockham/internal/scoring/types.go, os/Ockham/internal/scoring/scorer.go, os/Ockham/internal/scoring/scorer_test.go]
        depends: [task-2]
      - id: task-5
        title: "Governor assembly"
        files: [os/Ockham/internal/governor/governor.go, os/Ockham/internal/governor/governor_test.go]
        depends: [task-3, task-4]

  - name: "Wave 4 — CLI"
    tasks:
      - id: task-6
        title: "CLI root + intent subcommands"
        files: [os/Ockham/cmd/ockham/main.go, os/Ockham/cmd/ockham/root.go, os/Ockham/cmd/ockham/intent.go]
        depends: [task-3]
      - id: task-7
        title: "CLI dispatch advise command"
        files: [os/Ockham/cmd/ockham/dispatch.go]
        depends: [task-5, task-6]

  - name: "Wave 5 — Polish"
    tasks:
      - id: task-8
        title: "Full test suite + AGENTS.md update"
        files: [os/Ockham/AGENTS.md]
        depends: [task-7]
