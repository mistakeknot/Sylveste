version: 1
mode: dependency-driven
tier: deep
max_parallel: 5
timeout_per_task: 300

stages:
  - name: "Wave 1 — Foundations (parallel)"
    tasks:
      - id: task-1
        title: "Scaffold Astro project + plugin registration"
        files: [apps/interblog/package.json, apps/interblog/astro.config.mjs, apps/interblog/.claude-plugin/plugin.json]
        depends: []
      - id: task-8
        title: "Texturaize bridge schema + ingest endpoint"
        files: [apps/web/src/db/schema.ts, apps/web/src/app/api/bridge/ingest/route.ts]
        depends: []
        note: "Execute in /home/mk/projects/texturaize — manual context switch required"

  - name: "Wave 2 — Content + Skills + Deploy (after scaffold)"
    tasks:
      - id: task-2
        title: "First post — manual backfill for immediate portfolio evidence"
        files: [apps/interblog/src/content/published/2026-03-24-*.mdx]
        depends: [task-1]
        note: "Collaborative with mk — select brainstorm, write seed post"
      - id: task-3
        title: "Content collection schema (drafts, review, published)"
        files: [apps/interblog/src/content/config.ts]
        depends: [task-1]
      - id: task-6
        title: "Skills — scan + pitch + draft"
        files: [apps/interblog/skills/scan/SKILL.md, apps/interblog/skills/pitch/SKILL.md, apps/interblog/skills/draft/SKILL.md]
        depends: [task-1]
      - id: task-12
        title: "Vercel + Cloudflare deployment"
        files: [apps/interblog/vercel.json]
        depends: [task-1]
      - id: task-13
        title: "Editorial portfolio page"
        files: [apps/interblog/src/pages/editorial.astro]
        depends: [task-1]

  - name: "Wave 3 — Layout + Bridge completion"
    tasks:
      - id: task-4
        title: "Post layout with sidenotes + base styles"
        files: [apps/interblog/src/layouts/Post.astro, apps/interblog/src/components/Sidenote.astro, apps/interblog/src/styles/global.css]
        depends: [task-3]
      - id: task-7
        title: "Send skill — POST draft to Texturaize"
        files: [apps/interblog/skills/send/SKILL.md, apps/interblog/commands/send.md]
        depends: [task-6, task-8]
      - id: task-9
        title: "Texturaize callback sender with retry + HMAC"
        files: [apps/web/src/app/api/bridge/callback/route.ts]
        depends: [task-8]
        note: "Execute in /home/mk/projects/texturaize"
      - id: task-14
        title: "Voice profile + continued backfill"
        files: [apps/interblog/.interfluence/config.yaml]
        depends: [task-6]

  - name: "Wave 4 — Public surface + webhook"
    tasks:
      - id: task-5
        title: "Index page + RSS feed"
        files: [apps/interblog/src/pages/index.astro, apps/interblog/src/pages/rss.xml.ts]
        depends: [task-4]
      - id: task-10
        title: "Webhook receiver — standalone Vercel function with GitHub API"
        files: [apps/interblog/api/webhook/texturaize.ts]
        depends: [task-8, task-9]

  - name: "Wave 5 — Publish gate"
    tasks:
      - id: task-11
        title: "Publish command — partner-owned approval gate"
        files: [apps/interblog/commands/publish.md]
        depends: [task-10]
