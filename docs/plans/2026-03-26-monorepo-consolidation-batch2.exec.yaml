        files: [core/intercore/cmd/ic/run.go, core/intercore/internal/phase/gate.go]
        depends: []
      - id: task-3
        title: "F4a: Phase name deduplication (clavain-cli)"
        files: [core/intercore/pkg/phase/phase.go, os/Clavain/cmd/clavain-cli/budget.go, os/Clavain/cmd/clavain-cli/phase.go, os/Clavain/cmd/clavain-cli/policy.go, os/Clavain/cmd/clavain-cli/stats.go, os/Clavain/cmd/clavain-cli/factory_stream.go]
        depends: []

  - name: "Phase B — Safety & Governance (parallel)"
