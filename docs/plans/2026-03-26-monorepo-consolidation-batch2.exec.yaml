      - id: task-6
        title: "F6: Routing always-on (Skaffen + ic route dispatch)"
        files: [core/intercore/cmd/ic/route.go, os/Skaffen/internal/subagent/tool.go, os/Skaffen/internal/subagent/runner.go, os/Skaffen/internal/subagent/registry.go]
        depends: [task-1]
        tier: deep
