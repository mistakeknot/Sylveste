services:
  age:
    image: apache/age:release_PG16_1.6.0
    container_name: f1-age-spike
    environment:
      POSTGRES_PASSWORD: spike
      POSTGRES_USER: spike
      POSTGRES_DB: spike
    ports:
      - "5532:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - agedata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spike"]
      interval: 3s
      timeout: 2s
      retries: 10
volumes:
  agedata:
