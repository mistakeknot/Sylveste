# Sylveste interwatch configuration — 2026-03-02
# Velocity calibration: ~34 commits/day average (239/week).
# Thresholds tuned for high-velocity monorepo — reference: shadow-work calibration.
#
# Manual entries (without 'discovered: true') are preserved on rediscovery.
# Regenerate discovered entries: python3 scripts/interwatch-scan.py --rediscover

watchables:

# ─── Root docs ────────────────────────────────────────────────────────

- name: agents-md
  path: AGENTS.md
  generator: interdoc:interdoc
  generator_args: {}
  staleness_days: 5
  signals:
  - type: file_renamed
    weight: 3
  - type: file_deleted
    weight: 3
  - type: file_created
    weight: 2
  - type: commits_since_update
    weight: 1
    threshold: 40
  discovered: true

- name: claude-md
  path: CLAUDE.md
  generator: null
  generator_args: {}
  staleness_days: 7
  signals:
  - type: file_renamed
    weight: 3
  - type: file_deleted
    weight: 3
  - type: commits_since_update
    weight: 1
    threshold: 60

- name: readme-md
  path: README.md
  generator: null
  generator_args: {}
  staleness_days: 14
  signals:
  - type: file_renamed
    weight: 3
  - type: file_deleted
    weight: 3
  - type: commits_since_update
    weight: 1
    threshold: 80

- name: philosophy-md
  path: PHILOSOPHY.md
  generator: null
  generator_args: {}
  staleness_days: 30
  signals:
  - type: commits_since_update
    weight: 1
    threshold: 150

# ─── Product artifacts ────────────────────────────────────────────────

- name: sylveste-roadmap
  path: docs/sylveste-roadmap.md
  generator: interpath:roadmap
  generator_args: {}
  staleness_days: 5
  signals:
  - type: commits_since_update
    weight: 2
    threshold: 30
  - type: file_created
    weight: 1

- name: sylveste-vision
  path: docs/sylveste-vision.md
  generator: interpath:vision
  generator_args: {}
  staleness_days: 14
  signals:
  - type: commits_since_update
    weight: 1
    threshold: 80

# ─── Distillation ─────────────────────────────────────────────────────

- name: distillation-candidates
  path: docs/solutions/
  generator: null
  generator_args: {}
  staleness_days: 14
  signals:
  - type: unsynthesized_doc_count
    weight: 2
    threshold: 3
  - type: skills_without_compact
    weight: 1
    threshold: 2
  discovered: true

# ─── Key pillar AGENTS.md files ───────────────────────────────────────
# Monitor the 5 most active modules. These drift fastest during sprints.

